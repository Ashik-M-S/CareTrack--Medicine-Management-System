<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="max-width: 450px; display: flex; align-items: center; min-height: 100vh;">
        <div class="card glass animate-fade" style="width: 100%;">
            <h2 style="text-align: center;">Welcome <span class="text-gradient">Back</span></h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Sign in to your CareTrack
                account.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register here</a>
            </p>
            <p style="text-align: center; margin-top: 0.5rem; font-size: 0.875rem;">
                <a href="#" onclick="openModal('forgotPasswordModal')" style="color: var(--text-muted);">Forgot
                    Password?</a>
            </p>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        <div class="card glass modal" style="width: 100%; max-width: 400px; position: relative;">
            <h3>Reset Password</h3>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">Enter your details to reset
                your password.</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="resetDob" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="resetPhone" required placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="resetNewPassword" required placeholder="••••••••">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline"
                        onclick="closeModal('forgotPasswordModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await callApi('/auth/login', 'POST', { email, password });
                if (res.token) {
                    localStorage.setItem('user', JSON.stringify(res));
                    window.location.href = res.role === 'caretaker' ? 'caretaker-dashboard.html' : 'patient-dashboard.html';
                }
            } catch (err) {
                alert(err.message);
            }
        });

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const dob = document.getElementById('resetDob').value;
            const phone = document.getElementById('resetPhone').value;
            const newPassword = document.getElementById('resetNewPassword').value;

            try {
                await callApi('/auth/reset-password', 'POST', { email, dob, phone, newPassword });
                alert('Password reset successfully! You can now log in.');
                closeModal('forgotPasswordModal');
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
