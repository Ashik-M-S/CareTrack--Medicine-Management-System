<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CareTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="max-width: 450px; display: flex; align-items: center; min-height: 100vh;">
        <div class="card glass animate-fade" style="width: 100%;">
            <h2 style="text-align: center;">Join <span class="text-gradient">CareTrack</span></h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Create your account to start
                managing health.</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>I am a...</label>
                    <select id="role" required>
                        <option value="patient">Patient</option>
                        <option value="caretaker">Caretaker</option>
                    </select>
                </div>
                <!-- Extended Profile Details -->
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Age</label>
                        <input type="number" id="age" required placeholder="e.g. 45">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Gender</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+1234567890">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create
                    Account</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Already have an account? <a href="login.html" style="color: var(--primary-color);">Login here</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                phone: document.getElementById('phone').value
            };

            try {
                const res = await callApi('/auth/register', 'POST', userData);
                if (res.token) {
                    localStorage.setItem('user', JSON.stringify(res));
                    window.location.href = res.role === 'caretaker' ? 'caretaker-dashboard.html' : 'patient-dashboard.html';
                }
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
